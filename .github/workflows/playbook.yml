name: Playbook CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          execution-path: "ci"
          node-version: "22"
          working-directory: "."
          remediation-history-artifact-name: "playbook-remediation-artifacts-playbook-workflow"
          remediation-history-lookback: "5"
