name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: corepack disable

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - name: Ensure pnpm-lock.yaml is committed
        run: |
          if ! git diff --exit-code -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml changed during install. Regenerate and commit it (or run lockfile-refresh workflow)."
            exit 1
          fi
      - run: pnpm build
      - run: pnpm test
      - run: node scripts/smoke-test.mjs
