name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  npm_config_registry: https://registry.npmjs.org/
  PNPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  pnpm_config_registry: https://registry.npmjs.org/

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."
          run-smoke: "true"
          install-args: "--frozen-lockfile"
